<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfólio de Messias Lima ainda não está disponível.">
    <title>Em construção — Messias Lima</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111111;
            font-family: "Inter", sans-serif;
            color: #f2f2f2;
            padding: 24px;
        }

        .card {
            text-align: center;
            max-width: 420px;
        }

        .code {
            font-family: "JetBrains Mono", monospace;
            font-weight: 700;
            font-size: 72px;
            letter-spacing: 4px;
            color: #f2f2f2;
            line-height: 1;
        }

        .code span {
            color: #4ade80;
        }

        .emoji {
            font-size: 40px;
            margin: 16px 0;
        }

        h1 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            line-height: 22px;
            color: #a3a3a3;
            margin-bottom: 32px;
        }

        .terminal {
            font-family: "JetBrains Mono", monospace;
            font-size: 13px;
            color: #4ade80;
            background: #161616;
            border: 1px solid #262626;
            border-radius: 8px;
            padding: 12px 16px;
            text-align: left;
            margin-bottom: 32px;
        }

        .terminal .prompt {
            color: #737373;
        }

        a.button {
            display: inline-block;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            color: #0d0d0d;
            background: #f2f2f2;
            padding: 12px 24px;
            border-radius: 999px;
            transition: opacity 0.2s;
        }

        a.button:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">4<span>0</span>4</div>
        <div class="emoji">🚧</div>

        <h1>Portfólio em construção</h1>
        <p>
            Ainda estou organizando os projetos pra mostrar aqui.
            Volte em breve ou dá uma olhada no que já tenho pronto no GitHub.
        </p>

        <div class="terminal">
            <span class="prompt">$</span> status portfolio<br>
            <span class="prompt">></span> ainda_nao_disponivel = true
        </div>

        <a class="button" href="https://github.com/MessiasLim?tab=repositories" target="_blank" rel="noopener noreferrer">
            Ver no GitHub
        </a>
    </div>
</body>
</html>
